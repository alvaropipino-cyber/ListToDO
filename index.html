<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tareas</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Google+Sans+Text:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #F8F9FA;
  --surface:  #FFFFFF;
  --on-1:     #202124;
  --on-2:     #5F6368;
  --on-3:     #9AA0A6;
  --divider:  #E8EAED;
  --blue:     #1A73E8;
  --blue-lt:  #E8F0FE;
  --amber:    #F9AB00;
  --amber-lt: #FEF7E0;
  --green:    #1E8E3E;
  --green-lt: #E6F4EA;
  --red:      #D93025;
  --red-lt:   #FCE8E6;
  --r:        8px;
  --font:     'Google Sans Text','Google Sans',Roboto,Arial,sans-serif;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--on-1);
  min-height: 100vh;
  padding-bottom: 80px;
  -webkit-font-smoothing: antialiased;
}

/* Top bar */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--divider);
  height: 64px;
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-title {
  font-family: 'Google Sans', sans-serif;
  font-size: 18px;
  font-weight: 500;
  color: var(--on-1);
  flex: 1;
}
.topbar-date { font-size: 13px; color: var(--on-2); }
.topbar-count {
  font-size: 13px;
  color: var(--on-2);
  background: var(--bg);
  border: 1px solid var(--divider);
  border-radius: 12px;
  padding: 3px 12px;
}

/* Add task */
.add-wrap {
  max-width: 1040px;
  margin: 28px auto 0;
  padding: 0 24px;
}
.add-row {
  background: var(--surface);
  border: 1px solid var(--divider);
  border-radius: var(--r);
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 8px 0 16px;
  gap: 8px;
  transition: border-color .15s, box-shadow .15s;
}
.add-row:focus-within {
  border-color: var(--blue);
  box-shadow: 0 0 0 2px rgba(26,115,232,.1);
}
.add-icon { color: var(--on-3); display:flex; align-items:center; flex-shrink:0; }
.add-input {
  flex: 1;
  border: none;
  outline: none;
  font-family: var(--font);
  font-size: 14px;
  color: var(--on-1);
  background: transparent;
}
.add-input::placeholder { color: var(--on-3); }

/* Priority chip */
.prio-chip {
  position: relative;
  display: flex;
  align-items: center;
  gap: 5px;
  height: 34px;
  padding: 0 12px;
  border: 1px solid var(--divider);
  border-radius: 17px;
  font-size: 12px;
  font-weight: 500;
  color: var(--on-2);
  background: transparent;
  cursor: pointer;
  transition: background .1s, border-color .1s;
  white-space: nowrap;
  font-family: var(--font);
  flex-shrink: 0;
}
.prio-chip:hover { background: var(--bg); border-color: #bdc1c6; }
.prio-chip svg { width: 13px; height: 13px; }

/* Add button */
.add-btn {
  height: 36px;
  padding: 0 20px;
  border-radius: 18px;
  border: none;
  background: var(--blue);
  color: #fff;
  font-family: 'Google Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.add-btn:hover { background: #1558b0; }
.add-btn:active { background: #0f47a1; }

/* Board */
.board {
  max-width: 1040px;
  margin: 20px auto 0;
  padding: 0 24px;
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 16px;
  align-items: start;
}
@media(max-width:720px) {
  .board { grid-template-columns: 1fr; }
  .topbar { padding: 0 16px; }
  .add-wrap, .board { padding: 0 16px; }
}

/* Column */
.column {
  background: var(--surface);
  border: 1px solid var(--divider);
  border-radius: var(--r);
}
.col-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 13px 16px 12px;
  border-bottom: 1px solid var(--divider);
}
.col-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.col-todo .col-dot { background: var(--blue); }
.col-prog .col-dot { background: var(--amber); }
.col-done .col-dot { background: var(--green); }
.col-name {
  font-family: 'Google Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--on-2);
  letter-spacing: .04em;
  text-transform: uppercase;
}
.col-n {
  margin-left: auto;
  font-size: 12px;
  color: var(--on-3);
  background: var(--bg);
  border: 1px solid var(--divider);
  border-radius: 10px;
  padding: 1px 8px;
}

/* Tasks list */
.tasks { padding: 6px; min-height: 72px; display:flex; flex-direction:column; gap:1px; }
.empty {
  display:flex; align-items:center; justify-content:center;
  padding: 24px 12px;
  font-size: 13px;
  color: var(--on-3);
}

/* Task row */
.task-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 9px 8px;
  border-radius: 6px;
  transition: background .1s;
  animation: up .16s ease;
}
@keyframes up { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
.task-row:hover { background: var(--bg); }

/* Priority pill */
.p-pill {
  flex-shrink: 0;
  height: 20px;
  min-width: 28px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
  font-family: 'Google Sans', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 6px;
  cursor: pointer;
  position: relative;
  margin-top: 2px;
  transition: opacity .1s;
}
.p-pill:hover { opacity: .72; }
.p-low  { background:var(--green-lt); color:var(--green); }
.p-mid  { background:var(--amber-lt); color:#B06000; }
.p-high { background:var(--red-lt);   color:var(--red); }

.task-text {
  flex: 1;
  font-size: 14px;
  line-height: 1.5;
  color: var(--on-1);
  word-break: break-word;
}
.col-done .task-text { text-decoration: line-through; color: var(--on-3); }

.task-actions {
  display: flex;
  gap: 1px;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity .12s;
}
.task-row:hover .task-actions { opacity: 1; }

.icon-btn {
  width: 28px; height: 28px;
  border: none; border-radius: 50%;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--on-2);
  transition: background .1s;
  flex-shrink: 0;
}
.icon-btn:hover { background: var(--divider); }
.icon-btn.del:hover { background: var(--red-lt); color: var(--red); }
.icon-btn svg { width: 16px; height: 16px; }

/* Popovers */
.popover {
  display: none;
  position: absolute;
  background: var(--surface);
  border: 1px solid var(--divider);
  border-radius: var(--r);
  box-shadow: 0 4px 20px rgba(32,33,36,.15);
  z-index: 300;
  overflow: hidden;
}
.popover.open { display: block; }

/* Move popover */
.move-wrap { position:relative; }
.move-pop { top: calc(100% + 4px); right: 0; min-width: 168px; }
.move-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  font-size: 13px;
  cursor: pointer;
  color: var(--on-1);
  transition: background .08s;
}
.move-item:hover { background: var(--bg); }
.move-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* Priority popover */
.prio-pop {
  padding: 12px;
  width: 204px;
}
.prio-pop-lbl {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--on-3);
  letter-spacing: .04em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.prio-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; }
.p-opt {
  border: none; border-radius: 6px;
  padding: 5px 0;
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  font-family: 'Google Sans', sans-serif;
  transition: opacity .1s, transform .1s;
}
.p-opt:hover { opacity:.72; transform:scale(1.07); }
.p-opt.active { outline: 2px solid var(--on-1); outline-offset: 1px; }

/* chip popover position */
.prio-chip .prio-pop { top: calc(100% + 6px); right: 0; overflow:visible; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">Tareas</span>
  <span class="topbar-date" id="date-label"></span>
  <span class="topbar-count" id="total-count">0 tareas</span>
</div>

<div class="add-wrap">
  <div class="add-row">
    <span class="add-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    </span>
    <input class="add-input" id="new-task-input" type="text" placeholder="Agregar tarea…" maxlength="200">
    <div class="prio-chip" id="prio-chip" onclick="toggleChipPop(event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
      <span id="chip-lbl">P5</span>
      <div class="popover prio-pop" id="chip-pop"></div>
    </div>
    <button class="add-btn" onclick="addTask()">Agregar</button>
  </div>
</div>

<div class="board">
  <div class="column col-todo">
    <div class="col-head">
      <div class="col-dot"></div>
      <span class="col-name">Por hacer</span>
      <span class="col-n" id="count-todo">0</span>
    </div>
    <div class="tasks" id="tasks-todo"></div>
  </div>
  <div class="column col-prog">
    <div class="col-head">
      <div class="col-dot"></div>
      <span class="col-name">En progreso</span>
      <span class="col-n" id="count-prog">0</span>
    </div>
    <div class="tasks" id="tasks-prog"></div>
  </div>
  <div class="column col-done">
    <div class="col-head">
      <div class="col-dot"></div>
      <span class="col-name">Hecho</span>
      <span class="col-n" id="count-done">0</span>
    </div>
    <div class="tasks" id="tasks-done"></div>
  </div>
</div>

<script>
const KEY = 'todo_tasks_v1';
const COLS = ['todo','prog','done'];
const LABELS = { todo:'Por hacer', prog:'En progreso', done:'Hecho' };
const COLORS = { todo:'#1A73E8', prog:'#F9AB00', done:'#1E8E3E' };

const pc = p => p>=8?'p-high':p>=4?'p-mid':'p-low';
const pcol = p => p>=8?{bg:'#FCE8E6',fg:'#D93025'}:p>=4?{bg:'#FEF7E0',fg:'#B06000'}:{bg:'#E6F4EA',fg:'#1E8E3E'};

function load() { try{return JSON.parse(localStorage.getItem(KEY))||[];}catch{return[];} }
const save = t => localStorage.setItem(KEY, JSON.stringify(t));

let tasks = load();
tasks.forEach(t=>{ if(t.priority==null) t.priority=5; });
let newP = 5;

const SVG_MOVE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
const SVG_DEL  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>`;

function prioGridHTML(cur, taskId) {
  return Array.from({length:10},(_,i)=>i+1).map(n=>{
    const {bg,fg}=pcol(n), a=n===cur?' active':'';
    const fn = taskId ? `sp(event,'${taskId}',${n})` : `snp(event,${n})`;
    return `<button class="p-opt${a}" style="background:${bg};color:${fg}" onclick="${fn}">${n}</button>`;
  }).join('');
}

function buildChipPop() {
  document.getElementById('chip-pop').innerHTML =
    `<span class="prio-pop-lbl">Prioridad</span><div class="prio-grid">${prioGridHTML(newP,null)}</div>`;
}
buildChipPop();

function snp(e,p) { e.stopPropagation(); newP=p; document.getElementById('chip-lbl').textContent='P'+p; buildChipPop(); closeAll(); }

function sorted(col) {
  const f=tasks.filter(t=>t.status===col);
  return col==='done'?f:[...f].sort((a,b)=>b.priority-a.priority);
}

function render() {
  COLS.forEach(col=>{
    const box=document.getElementById('tasks-'+col);
    const list=sorted(col);
    document.getElementById('count-'+col).textContent=list.length;
    box.innerHTML='';
    if(!list.length){ box.innerHTML='<div class="empty">Sin tareas</div>'; return; }
    list.forEach(task=>{
      const p=task.priority||5;
      const others=COLS.filter(c=>c!==col);
      const moveItems=others.map(c=>`<div class="move-item" onclick="mv('${task.id}','${c}')"><span class="move-dot" style="background:${COLORS[c]}"></span>${LABELS[c]}</div>`).join('');
      const row=document.createElement('div');
      row.className='task-row';
      row.innerHTML=`
        <div class="p-pill ${pc(p)}" title="P${p} — clic para cambiar" onclick="tpop(event,'pp-${task.id}')">
          ${p}
          <div class="popover prio-pop" id="pp-${task.id}" style="top:26px;left:50%;transform:translateX(-50%)">
            <span class="prio-pop-lbl">Prioridad</span>
            <div class="prio-grid">${prioGridHTML(p,task.id)}</div>
          </div>
        </div>
        <span class="task-text">${esc(task.text)}</span>
        <div class="task-actions">
          <div class="move-wrap">
            <button class="icon-btn" title="Mover" onclick="tpop(event,'mp-${task.id}')">${SVG_MOVE}</button>
            <div class="popover move-pop" id="mp-${task.id}">${moveItems}</div>
          </div>
          <button class="icon-btn del" title="Eliminar" onclick="del('${task.id}')">${SVG_DEL}</button>
        </div>`;
      box.appendChild(row);
    });
  });
  const n=tasks.length;
  document.getElementById('total-count').textContent=n+(n===1?' tarea':' tareas');
}

const esc = s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function addTask() {
  const inp=document.getElementById('new-task-input');
  const text=inp.value.trim(); if(!text) return;
  tasks.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2),text,status:'todo',priority:newP});
  save(tasks); render(); inp.value=''; inp.focus();
}

function mv(id,status) { const t=tasks.find(t=>t.id===id); if(t){t.status=status;save(tasks);render();} closeAll(); }
function del(id) { tasks=tasks.filter(t=>t.id!==id); save(tasks); render(); }
function sp(e,id,p) { e.stopPropagation(); const t=tasks.find(t=>t.id===id); if(t){t.priority=p;save(tasks);render();} closeAll(); }
function tpop(e,id) { e.stopPropagation(); const el=document.getElementById(id); const was=el.classList.contains('open'); closeAll(); if(!was) el.classList.add('open'); }
function toggleChipPop(e) { e.stopPropagation(); const p=document.getElementById('chip-pop'); const was=p.classList.contains('open'); closeAll(); if(!was) p.classList.add('open'); }
function closeAll() { document.querySelectorAll('.popover.open').forEach(p=>p.classList.remove('open')); }

document.addEventListener('click', closeAll);
document.getElementById('new-task-input').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(); });

document.getElementById('date-label').textContent =
  new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'}).replace(/^\w/,c=>c.toUpperCase());

render();
</script>
</body>
</html>
